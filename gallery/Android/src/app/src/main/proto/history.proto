syntax = "proto3";

package com.google.ai.edge.gallery.proto;

option java_package = "com.google.ai.edge.gallery.proto";
option java_multiple_files = true;

message ChatHistory {
  repeated ChatSession sessions = 1;
}

message ChatSession {
  string id = 1;
  string title = 2;
  int64 timestamp = 3;
  repeated ChatMessageProto messages = 4;
  string model_name = 5;
  string task_id = 6;
}

message ChatMessageProto {
  string side = 1; // "USER", "AGENT", "SYSTEM"
  string type = 2; // "TEXT", "THINKING", "INFO", "WARNING", "ERROR"
  string content = 3;
  int64 timestamp = 4;
  float latency_ms = 5;
  string accelerator = 6;
}
