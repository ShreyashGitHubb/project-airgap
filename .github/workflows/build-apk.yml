name: Build Project Airgap APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gallery/Android/src/gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: gallery/Android/src

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: project-airgap-debug-apk
        path: gallery/Android/src/app/build/outputs/apk/debug/app-debug.apk
